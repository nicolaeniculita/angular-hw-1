<ng-container *ngIf="(page$ | async) as p">
  <div class="table-wrapper">
    <table class="passenger-table">
      <thead>
        <tr class="table-header">
          <th>ID</th>
          <th>Survived</th>
          <th>Class</th>
          <th>
            <app-passenger-name-header
              [sortState]="(sortState$ | async) ?? 'NONE'"
              (sortClicked)="passengersService.toggleNameSort()"
            ></app-passenger-name-header>
          </th>
          <th>Sex</th>
          <th>Age</th>
          <th>SibSp</th>
          <th>Parch</th>
          <th>Ticket</th>
          <th>Fare</th>
          <th>Cabin</th>
          <th>Embarked</th>
        </tr>
      </thead>

      <tbody>
        <tr app-passenger-row *ngFor="let passenger of p.passengers" [passenger]="passenger"></tr>
      </tbody>
    </table>
  </div>
</ng-container>

<app-pagination></app-pagination>
